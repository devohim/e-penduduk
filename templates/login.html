<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login | E-Penduduk</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
* {
    font-family: Segoe UI, Tahoma, sans-serif;
}

body {
    /* Gradasi persis sama dengan sidebar dashboard */
    background: linear-gradient(135deg, #0d6efd, #4f46e5);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-card {
    width: 430px;
    border: none;
    /* Sudut lengkung disesuaikan sama dengan kartu dashboard */
    border-radius: 18px;
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.95);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
}

.logo {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    /* Warna latar logo sesuai tema utama */
    background: linear-gradient(135deg, #0d6efd, #4f46e5);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: auto;
    font-size: 40px;
}

.form-control {
    height: 52px;
    border-radius: 12px;
    border: 1px solid #dee2e6;
}

.form-control:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
}

.input-group-text {
    border-radius: 12px 0 0 12px;
    background: white;
    border: 1px solid #dee2e6;
}

.btn-primary {
    /* Menggunakan gradasi persis sama tema */
    background: linear-gradient(135deg, #0d6efd, #4f46e5);
    border: none;
    border-radius: 12px;
    height: 52px;
    font-weight: bold;
    transition: all 0.3s ease;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(13, 110, 253, 0.35);
    background: linear-gradient(135deg, #0b5ed7, #4338ca);
}

.btn-outline-primary {
    border-color: #0d6efd;
    color: #0d6efd;
    border-radius: 12px;
    height: 50px;
    transition: all 0.3s ease;
}

.btn-outline-primary:hover {
    background: linear-gradient(135deg, #0d6efd, #4f46e5);
    border-color: transparent;
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(13, 110, 253, 0.35);
}

.text-small {
    font-size: 14px;
}

.alert {
    border-radius: 12px;
}

.form-check-input:checked {
    background-color: #0d6efd;
    border-color: #0d6efd;
}
</style>
</head>

<body>
<div class="card login-card">
    <div class="card-body p-5">
        <div class="text-center mb-4">
            <div class="logo mb-3">
                <i class="bi bi-person-vcard-fill"></i>
            </div>
            <h3 class="fw-bold">E-Penduduk</h3>
            <p class="text-muted">Silakan login untuk melanjutkan</p>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-danger shadow-sm">
            <i class="bi bi-exclamation-circle-fill me-2"></i>
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-4">
                <label class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" name="username" class="form-control" placeholder="Masukkan Username" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Masukkan Password" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                        <i class="bi bi-eye" id="eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label text-small" for="remember">Ingat Saya</label>
                </div>
                <a href="#" class="text-decoration-none text-primary text-small">Lupa Password?</a>
            </div>

            <button class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>
                Login
            </button>
        </form>

        <div class="text-center my-4">
            <span class="text-muted">──────── atau ────────</span>
        </div>

        <a href="/register" class="btn btn-outline-primary w-100">
            <i class="bi bi-person-plus-fill me-2"></i>
            Buat Akun Baru
        </a>

        <div class="text-center mt-4">
            <small class="text-muted">
                © 2026 E-Penduduk
                <br>
                Sistem Informasi Kependudukan
            </small>
        </div>
    </div>
</div>

<script>
function togglePassword(){
    let password = document.getElementById("password");
    let eye = document.getElementById("eye");
    if(password.type === "password"){
        password.type = "text";
        eye.className = "bi bi-eye-slash";
    }else{
        password.type = "password";
        eye.className = "bi bi-eye";
    }
}
</script>
</body>
</html>
