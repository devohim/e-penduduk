{% extends "layout.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-header" style="background: linear-gradient(135deg, #0d6efd, #4f46e5); color: white; border: none; border-radius: 18px 18px 0 0;">
        <h3 class="mb-0 fw-bold">Tambah Penduduk</h3>
    </div>

    <div class="card-body p-4">

        <form action="/simpan" method="POST" enctype="multipart/form-data">

            <div class="mb-4">
                <label class="form-label fw-semibold">NIK</label>
                <input
                    type="text"
                    class="form-control"
                    name="nik"
                    placeholder="Masukkan Nomor Induk Kependudukan"
                    required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Nama Lengkap</label>
                <input
                    type="text"
                    class="form-control"
                    name="nama"
                    placeholder="Masukkan nama lengkap"
                    required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Jenis Kelamin</label>
                <select
                    name="jenis_kelamin"
                    class="form-select"
                    required>
                    <option value="">-- Pilih Jenis Kelamin --</option>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Alamat Lengkap</label>
                <textarea
                    class="form-control"
                    name="alamat"
                    rows="3"
                    placeholder="Masukkan alamat lengkap"
                    required></textarea>
            </div>

            <div class="mb-5">
                <label class="form-label fw-semibold">Upload Foto KTP</label>
                <input
                    type="file"
                    class="form-control"
                    name="ktp"
                    accept=".jpg,.jpeg,.png,.pdf"
                    required>
                <small class="text-muted">Format yang didukung: JPG, PNG, PDF</small>
            </div>

            <button type="submit" class="btn btn-primary me-2">
                <i class="bi bi-save me-2"></i>Simpan Data
            </button>

            <a href="/" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left me-2"></i>Kembali
            </a>

        </form>

    </div>

</div>

{% endblock %}
